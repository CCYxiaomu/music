<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebMusic - 在线音乐播放器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 视频背景 */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-background video {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            object-position: center center;
        }

        .video-background::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.1);
            z-index: 1;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: rgba(19, 19, 19, 0.75);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: bold;
            color: #ec4141;
        }

        .logo i {
            font-size: 28px;
        }

        .nav-tabs {
            display: flex;
            gap: 30px;
        }

        .nav-tab {
            color: #999;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
            font-size: 14px;
        }

        .nav-tab:hover,
        .nav-tab.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            background: #2a2a2a;
            border: none;
            padding: 8px 15px 8px 35px;
            border-radius: 20px;
            color: #fff;
            width: 200px;
            outline: none;
        }

        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 220px;
            background: rgba(19, 19, 19, 0.8);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 0;
            overflow-y: auto;
        }

        .sidebar-section {
            margin-bottom: 25px;
        }

        .sidebar-title {
            padding: 0 20px;
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .sidebar-item {
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #999;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .sidebar-item i {
            width: 20px;
            text-align: center;
        }

        .content-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: rgba(26, 26, 26, 0.65);
            backdrop-filter: blur(10px);
        }

        .song-detail-header {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(135deg, rgba(236, 65, 65, 0.1) 0%, rgba(236, 65, 65, 0.05) 100%);
            border-radius: 12px;
        }

        .album-cover-large {
            width: 240px;
            height: 240px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
        }

        .album-cover-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .song-detail-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .song-detail-info h1 {
            font-size: 32px;
            margin-bottom: 15px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
        }

        .song-detail-info .artist {
            font-size: 18px;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
        }

        .detail-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .detail-btn {
            padding: 12px 30px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .play-btn-large {
            background: #ec4141;
            color: #fff;
        }

        .play-btn-large:hover {
            background: #d63a3a;
        }

        .mode-btn-detail {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .mode-btn-detail:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .playlist-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 20px;
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #2a2a2a;
        }

        .playlist-header h2 {
            font-size: 20px;
        }

        .song-list-header {
            display: grid;
            grid-template-columns: 50px 2fr 1fr 80px;
            padding: 10px 15px;
            color: #666;
            font-size: 12px;
            border-bottom: 1px solid #2a2a2a;
        }

        .song-list-item {
            display: grid;
            grid-template-columns: 50px 2fr 1fr 80px;
            padding: 12px 15px;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 6px;
        }

        .song-list-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .song-list-item.active {
            background: rgba(236, 65, 65, 0.15);
        }

        .song-number {
            color: #666;
            font-size: 14px;
        }

        .song-list-item.active .song-number {
            color: #ec4141;
        }

        .song-name-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .song-name-cell img {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
        }

        .song-name-text {
            font-weight: 500;
        }

        .song-artist-cell {
            color: #999;
        }

        .song-duration-cell {
            color: #666;
            text-align: right;
        }

        .lyrics-panel {
            width: 350px;
            background: rgba(19, 19, 19, 0.8);
            backdrop-filter: blur(12px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 20px;
            overflow-y: auto;
        }

        .lyrics-title {
            font-size: 16px;
            margin-bottom: 20px;
            color: #999;
            text-align: center;
        }

        .lyrics-content {
            line-height: 2;
        }

        .lyric-line {
            padding: 8px 15px;
            color: #666;
            transition: all 0.3s;
            border-radius: 6px;
            text-align: center;
        }

        .lyric-line.active {
            color: #ec4141;
            background: rgba(236, 65, 65, 0.1);
            font-size: 15px;
            font-weight: 500;
        }

        .player-bar {
            background: rgba(26, 26, 26, 0.85);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            align-items: center;
            gap: 20px;
            height: 80px;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .player-cover {
            width: 55px;
            height: 55px;
            border-radius: 6px;
            overflow: hidden;
        }

        .player-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-song-info {
            flex: 1;
        }

        .player-song-name {
            font-size: 14px;
            margin-bottom: 5px;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
        }

        .player-artist-name {
            font-size: 12px;
            color: #ddd;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
        }

        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .control-btn {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
            padding: 8px;
        }

        .control-btn:hover {
            color: #fff;
            transform: scale(1.1);
        }

        .play-pause-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #fff;
            color: #131313;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .play-pause-btn:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }

        .progress-section {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }

        .time-text {
            font-size: 11px;
            color: #666;
            min-width: 40px;
        }

        .progress-bar-container {
            flex: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: #ec4141;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s;
        }

        .player-extra {
            display: flex;
            align-items: center;
            gap: 15px;
            justify-content: flex-end;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-slider {
            width: 80px;
            -webkit-appearance: none;
            height: 4px;
            background: #333;
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        .mode-badge {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-badge:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #131313;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        @media (max-width: 1200px) {
            .lyrics-panel {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .player-bar {
                grid-template-columns: 1fr;
                height: auto;
                padding: 15px;
            }
            
            .song-detail-header {
                flex-direction: column;
            }
            
            .album-cover-large {
                width: 100%;
                height: 300px;
            }
        }
    </style>
</head>

                songListContainer.appendChild(div);
            });
            songCount.textContent = `${currentSongs.length}首`;
        }

        function switchCategory(artist) {
            currentArtist = artist;
            if (artist === 'all') {
                currentSongs = getAllSongs();
                playlistTitle.textContent = '全部歌曲';
            } else {
                currentSongs = [...SONGS_DB[artist]];
                playlistTitle.textContent = `${artist}的歌曲`;
            }
            currentIndex = 0;
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.artist === artist) item.classList.add('active');
            });
            renderPlaylist();
            if (currentSongs.length > 0) loadSong(currentIndex);
        }

        function playSong() {
            audio.play().then(() => {
                isPlaying = true;
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                detailPlayBtn.innerHTML = '<i class="fas fa-pause"></i> 暂停';
            }).catch(err => console.error("播放失败:", err));
        }

        function pauseSong() {
            audio.pause();
            isPlaying = false;
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
            detailPlayBtn.innerHTML = '<i class="fas fa-play"></i> 播放';
        }

        function togglePlay() {
            if (isPlaying) pauseSong();
            else playSong();
        }

        function nextSong() {
            if (playMode === 1) {
                let newIndex;
                do {
                    newIndex = Math.floor(Math.random() * currentSongs.length);
                } while (newIndex === currentIndex && currentSongs.length > 1);
                currentIndex = newIndex;
            } else if (playMode === 0) {
                currentIndex = (currentIndex + 1) % currentSongs.length;
            }
            loadSong(currentIndex);
            if (isPlaying) playSong();
        }

        function prevSong() {
            if (playMode === 1) {
                let newIndex;
                do {
                    newIndex = Math.floor(Math.random() * currentSongs.length);
                } while (newIndex === currentIndex && currentSongs.length > 1);
                currentIndex = newIndex;
            } else {
                currentIndex = (currentIndex - 1 + currentSongs.length) % currentSongs.length;
            }
            loadSong(currentIndex);
            if (isPlaying) playSong();
        }

        function switchPlayMode() {
            playMode = (playMode + 1) % 3;
            const modes = ['顺序', '随机', '单曲循环'];
            const icons = ['fa-list', 'fa-random', 'fa-redo'];
            const fullModes = ['顺序播放', '随机播放', '单曲循环'];
            modeText.textContent = modes[playMode];
            modeBadge.innerHTML = `<i class="fas ${icons[playMode]}"></i> <span>${modes[playMode]}</span>`;
            detailModeText.textContent = fullModes[playMode];
        }

        function updateProgress() {
            if (audio.duration) {
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${progressPercent}%`;
                currentTimeEl.textContent = formatTime(audio.currentTime);
                durationEl.textContent = formatTime(audio.duration);
                renderLyrics(audio.currentTime);
            }
        }

        function setProgress(e) {
            const width = progressBar.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            if (duration) audio.currentTime = (clickX / width) * duration;
        }

        function initPlayer() {
            const savedVolume = localStorage.getItem('playerVolume');
            if (savedVolume !== null) {
                audio.volume = parseFloat(savedVolume);
                volumeSlider.value = audio.volume;
            }
            renderPlaylist();
            if (currentSongs.length > 0) loadSong(currentIndex);
            playBtn.addEventListener('click', togglePlay);
            detailPlayBtn.addEventListener('click', togglePlay);
            prevBtn.addEventListener('click', prevSong);
            nextBtn.addEventListener('click', nextSong);
            modeBadge.addEventListener('click', switchPlayMode);
            detailModeBtn.addEventListener('click', switchPlayMode);
            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('loadedmetadata', () => {
                durationEl.textContent = formatTime(audio.duration);
            });
            audio.addEventListener('ended', () => {
                if (playMode === 2) {
                    audio.currentTime = 0;
                    playSong();
                } else nextSong();
            });
            progressBar.addEventListener('click', setProgress);
            volumeSlider.addEventListener('input', (e) => {
                audio.volume = e.target.value;
                localStorage.setItem('playerVolume', audio.volume);
            });
            document.querySelectorAll('.sidebar-item[data-artist]').forEach(item => {
                item.addEventListener('click', () => {
                    if (item.dataset.artist !== currentArtist) switchCategory(item.dataset.artist);
                });
            });
        }

        document.addEventListener('DOMContentLoaded', initPlayer);
    </script>
</body>
</html>
